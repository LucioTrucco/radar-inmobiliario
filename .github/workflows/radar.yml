name: Radar Inmobiliario

# Corre solo todos los días + se puede disparar a mano desde la pestaña "Actions".
on:
  schedule:
    - cron: "0 11 * * *"      # 11:00 UTC = 08:00 Argentina, todos los días
  workflow_dispatch: {}

# Permiso para que la corrida pueda guardar la base actualizada en el repo.
permissions:
  contents: write

# Evita que dos corridas se pisen.
concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Buscar novedades y actualizar la base
        run: python run.py

      - name: Guardar la base actualizada
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/radar.db
          if git diff --staged --quiet; then
            echo "Sin cambios en la base."
          else
            git commit -m "Actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
